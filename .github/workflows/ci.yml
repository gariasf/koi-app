name: CI
on:
  push:
  pull_request:

jobs:
  ios-tests:
    # Koi uses iOS 26 APIs (Liquid Glass `.glassEffect`), so it needs Xcode 26 → the macOS 26 runner.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Unit tests
        run: |
          xcodebuild test \
            -project Koi.xcodeproj \
            -scheme Koi \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_APPICON_NAME=""
            # ^ the app icon is an Icon Composer .icon (needs Xcode 26); the CI runner's Xcode
            #   can't compile it and tests don't need it, so build without an app icon.
